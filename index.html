<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <title>Slider</title>

</head>

<body>

    <div class="slider-wrapper">
        <div class="slider" id="slider">
            <div class="slide">
                <img src="img/1.jpg">
            </div>
            <div class="slide">
                <img src="img/2.jpg">
            </div>
            <div class="slide">
                <img src="img/3.jpg">
            </div>
            <div class="slide">
                <img src="img/4.jpg">
            </div>
            <div class="slide">
                <img src="img/6.jpg">
            </div>
            <div class="slide">
                <img src="img/7.jpg">
            </div>
        </div>
    </div>

    <div class="buttons">
        <button onclick="prev()">Prev</button>
        <button onclick="next()">Next</button>
    </div>


</body>

</html>
